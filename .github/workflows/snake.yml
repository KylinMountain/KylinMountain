name: Generate snake

on:
  schedule:
    - cron: "41 3 * * *"   # daily, 03:41 UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Generate contribution snake (themed)
        uses: Platane/snk@d8f6715049803e982ee5ff501b6b9b7d5deeb09b  # v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=#38e0c8
            dist/snake-light.svg?color_snake=#0f766e&color_dots=#ebedf0,#9be9d6,#38e0c8,#0f766e,#b45309

      - name: Publish to the output branch
        run: |
          cd dist
          git init -q -b output
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -q -m "chore: regenerate contribution snake"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
